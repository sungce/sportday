<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 수완하나중 스포츠 데이</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700;900&display=swap');
        body { font-family: 'Noto Sans KR', sans-serif; }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        .fade-in { animation: fadeIn 0.5s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 pb-12">

    <!-- Loading Overlay -->
    <div id="loading" class="fixed inset-0 bg-white z-[100] flex flex-col items-center justify-center">
        <div class="w-12 h-12 border-4 border-indigo-600 border-t-transparent rounded-full animate-spin"></div>
        <p class="mt-4 text-indigo-600 font-medium animate-pulse">시스템 로딩 중...</p>
    </div>

    <!-- Navigation -->
    <nav class="bg-indigo-700 text-white shadow-xl sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-4 h-16 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <div class="p-2 bg-white/20 rounded-lg">
                    <i data-lucide="trophy" class="w-6 h-6"></i>
                </div>
                <span class="font-black text-xl tracking-tighter uppercase">2026 수완하나중 스포츠 데이</span>
            </div>
            <div class="flex bg-indigo-900/50 rounded-full p-1 border border-white/10">
                <button onclick="switchView('dashboard')" id="btn-dashboard" class="nav-btn active flex items-center gap-2 px-4 py-2 rounded-full transition-all duration-300 bg-white text-indigo-700 shadow-lg font-bold">
                    <i data-lucide="layout-dashboard" class="w-4 h-4"></i>
                    <span class="hidden sm:inline text-sm">대시보드</span>
                </button>
                <button onclick="switchView('table')" id="btn-table" class="nav-btn flex items-center gap-2 px-4 py-2 rounded-full transition-all duration-300 text-white/70 hover:text-white hover:bg-white/10">
                    <i data-lucide="clipboard-list" class="w-4 h-4"></i>
                    <span class="hidden sm:inline text-sm">현황판</span>
                </button>
                <button onclick="switchView('admin')" id="btn-admin" class="nav-btn flex items-center gap-2 px-4 py-2 rounded-full transition-all duration-300 text-white/70 hover:text-white hover:bg-white/10">
                    <i data-lucide="settings" class="w-4 h-4"></i>
                    <span class="hidden sm:inline text-sm">채점</span>
                </button>
            </div>
        </div>
    </nav>

    <main id="content" class="max-w-6xl mx-auto px-4 py-6 min-h-screen">
        <!-- 내용이 JS에 의해 동적으로 삽입됩니다 -->
    </main>

    <footer class="mt-12 py-8 text-center border-t border-slate-200">
        <a href="https://github.com/sungce/sportday.git" target="_blank" class="inline-flex items-center gap-2 text-[10px] text-slate-400 hover:text-indigo-600 transition uppercase tracking-widest font-bold mb-2">
            <i data-lucide="github" class="w-3.5 h-3.5"></i>
            GitHub Repository: sungce/sportday
        </a>
        <p class="text-[10px] text-slate-300">© 2026 Suwan Hana Middle School Sports Day</p>
    </footer>

    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-auth.js";
        import { getFirestore, collection, doc, onSnapshot, setDoc, query } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js";

        // --- Firebase Config (반드시 본인의 설정으로 교체하세요) ---
        const firebaseConfig = {
            apiKey: "", // 비워두면 환경에서 제공하는 키 사용
            authDomain: "your-project.firebaseapp.com",
            projectId: "your-project",
            storageBucket: "your-project.appspot.com",
            messagingSenderId: "123456789",
            appId: "1:123456789:web:abcdef"
        };
        
        // 환경 설정이 있는 경우 우선 사용
        const actualConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : firebaseConfig;
        const app = initializeApp(actualConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'sports-day-final';

        // --- Constants ---
        const EVENTS = [
            { id: 'tug', name: '줄다리기', type: 'rank', points: { 1: 600, 2: 500, 3: 400, base: 300 } },
            { id: 'sixLeg', name: '5인 6각', type: 'rank', points: { 1: 600, 2: 500, 3: 400, base: 300 } },
            { id: 'jump8', name: '8자 마라톤 줄넘기', type: 'rank', points: { 1: 500, 2: 400, 3: 300, base: 200 } },
            { id: 'longRope', name: '긴줄 함께뛰기', type: 'rank', points: { 1: 400, 2: 300, 3: 200, base: 100 } },
            { id: 'relay', name: '이어달리기', type: 'rank', points: { 1: 400, 2: 300, 3: 200, base: 100 } },
            { id: 'cheer', name: '기타(응원상)', type: 'raw' }
        ];

        const GRADES = [
            { grade: 1, classes: 10 },
            { grade: 2, classes: 10 },
            { grade: 3, classes: 11 }
        ];

        let currentView = 'dashboard';
        let scores = {};
        let currentUser = null;

        // --- Init App ---
        window.onload = async () => {
            try {
                await signInAnonymously(auth);
                onAuthStateChanged(auth, (user) => {
                    currentUser = user;
                    if (user) listenToScores();
                });
            } catch (err) {
                console.error("Auth Error", err);
            }
            lucide.createIcons();
        };

        function listenToScores() {
            const q = query(collection(db, 'artifacts', appId, 'public', 'data', 'scores'));
            onSnapshot(q, (snapshot) => {
                scores = {};
                snapshot.forEach(doc => {
                    scores[doc.id] = doc.data();
                });
                render();
                document.getElementById('loading').classList.add('hidden');
            });
        }

        // --- Logic ---
        function calculateStats() {
            const results = [];
            GRADES.forEach(g => {
                for (let c = 1; c <= g.classes; c++) {
                    const id = `${g.grade}-${c}`;
                    const classData = scores[id] || {};
                    let total = 0;
                    const breakdown = {};

                    EVENTS.forEach(ev => {
                        const val = classData[ev.id];
                        let p = 0;
                        if (ev.type === 'raw') {
                            p = parseInt(val) || 0;
                        } else {
                            if (val === 1) p = ev.points[1];
                            else if (val === 2) p = ev.points[2];
                            else if (val === 3) p = ev.points[3];
                            else if (val >= 4) p = ev.points.base;
                        }
                        total += p;
                        breakdown[ev.id] = p;
                    });

                    results.push({ id, grade: g.grade, classNum: c, total, breakdown });
                }
            });
            return results;
        }

        function getRank(grade, total, allStats) {
            const gradeTotals = allStats.filter(s => s.grade === grade).map(s => s.total);
            const sorted = [...new Set(gradeTotals)].sort((a, b) => b - a);
            return sorted.indexOf(total) + 1;
        }

        // --- Rendering ---
        window.switchView = (view) => {
            currentView = view;
            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.className = "nav-btn flex items-center gap-2 px-4 py-2 rounded-full transition-all duration-300 text-white/70 hover:text-white hover:bg-white/10";
            });
            const activeBtn = document.getElementById(`btn-${view}`);
            activeBtn.className = "nav-btn active flex items-center gap-2 px-4 py-2 rounded-full transition-all duration-300 bg-white text-indigo-700 shadow-lg font-bold";
            render();
        };

        async function updateScore(grade, classNum, eventId, value) {
            if (!currentUser) return;
            const docId = `${grade}-${classNum}`;
            const currentData = scores[docId] || { grade, classNum };
            const finalValue = value === "" ? null : (isNaN(value) ? value : parseInt(value));

            await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'scores', docId), {
                ...currentData,
                [eventId]: finalValue,
                lastUpdated: Date.now()
            });
        }

        function render() {
            const stats = calculateStats();
            const container = document.getElementById('content');
            container.innerHTML = '';
            const div = document.createElement('div');
            div.className = "fade-in";

            if (currentView === 'dashboard') {
                GRADES.forEach(g => {
                    const gradeStats = stats.filter(s => s.grade === g.grade).sort((a,b) => b.total - a.total);
                    let html = `
                        <section class="mb-10 space-y-4">
                            <div class="flex items-center gap-2 border-l-4 border-indigo-600 pl-3">
                                <h2 class="text-xl font-black text-slate-800">${g.grade}학년 실시간 랭킹</h2>
                            </div>
                            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    `;
                    gradeStats.slice(0, 3).forEach((top, idx) => {
                        const bg = idx === 0 ? 'bg-amber-50 border-amber-200' : idx === 1 ? 'bg-slate-50 border-slate-200' : 'bg-orange-50 border-orange-200';
                        const badge = idx === 0 ? 'bg-amber-500' : idx === 1 ? 'bg-slate-400' : 'bg-orange-400';
                        html += `
                            <div class="relative overflow-hidden p-5 rounded-3xl border-2 transition transform hover:scale-105 ${bg}">
                                <div class="flex justify-between items-start mb-2">
                                    <span class="px-2 py-1 rounded-full text-xs font-bold text-white uppercase ${badge}">${idx+1}위</span>
                                    <span class="text-2xl font-black text-slate-800">${top.classNum}반</span>
                                </div>
                                <div class="text-xl font-bold text-slate-900">${top.total.toLocaleString()} <span class="text-xs font-normal text-slate-500">점</span></div>
                            </div>
                        `;
                    });
                    html += `</div><div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-4 grid grid-cols-2 sm:grid-cols-5 md:grid-cols-11 gap-2">`;
                    gradeStats.sort((a,b) => a.classNum - b.classNum).forEach(s => {
                        html += `
                            <div class="flex flex-col items-center p-2 rounded-xl bg-slate-50 border border-transparent">
                                <span class="text-xs text-slate-400 font-bold">${s.classNum}반</span>
                                <span class="text-sm font-black text-slate-700">${s.total}</span>
                            </div>
                        `;
                    });
                    html += `</div></section>`;
                    div.innerHTML += html;
                });
            } else if (currentView === 'table') {
                GRADES.forEach(g => {
                    let html = `
                        <div class="bg-white rounded-2xl shadow-xl overflow-hidden border border-slate-200 mb-10">
                            <div class="p-5 bg-slate-800 text-white flex justify-between items-center">
                                <h2 class="text-lg font-bold tracking-wider">${g.grade}학년 종합 점수 현황</h2>
                            </div>
                            <div class="overflow-x-auto">
                                <table class="w-full text-sm text-center">
                                    <thead>
                                        <tr class="bg-slate-100 text-slate-600 font-bold border-b border-slate-200">
                                            <th class="p-3">반</th>
                                            ${EVENTS.map(ev => `<th class="p-3 text-xs min-w-[90px] ${ev.id === 'cheer' ? 'bg-amber-50 text-amber-700' : ''}">${ev.name}</th>`).join('')}
                                            <th class="p-3 bg-indigo-50 text-indigo-700 font-black">합계</th>
                                            <th class="p-3">순위</th>
                                        </tr>
                                    </thead>
                                    <tbody class="divide-y divide-slate-100">
                    `;
                    const gradeData = stats.filter(s => s.grade === g.grade);
                    gradeData.forEach(s => {
                        html += `
                            <tr class="hover:bg-slate-50">
                                <td class="p-3 font-bold text-slate-500 border-r border-slate-100">${s.classNum}반</td>
                                ${EVENTS.map(ev => `<td class="p-3 text-xs ${ev.id === 'cheer' ? 'bg-amber-50/30 font-bold' : 'text-slate-600'}">${s.breakdown[ev.id] || 0}</td>`).join('')}
                                <td class="p-3 font-black text-indigo-600 bg-indigo-50/30">${s.total.toLocaleString()}</td>
                                <td class="p-3"><span class="px-2 py-0.5 rounded text-[11px] font-bold bg-slate-100">${getRank(g.grade, s.total, stats)}위</span></td>
                            </tr>
                        `;
                    });
                    html += `</tbody></table></div></div>`;
                    div.innerHTML += html;
                });
            } else if (currentView === 'admin') {
                div.innerHTML = `
                    <div class="bg-indigo-600 text-white p-5 rounded-3xl shadow-lg flex items-center justify-between mb-6">
                        <h2 class="text-lg font-bold">실시간 채점 센터</h2>
                    </div>
                `;
                GRADES.forEach(g => {
                    let html = `
                        <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden mb-6">
                            <div class="p-3 bg-slate-50 border-b font-bold text-sm">${g.grade}학년 점수 입력</div>
                            <div class="p-3 overflow-x-auto">
                                <table class="w-full">
                                    <thead><tr class="text-[10px] text-slate-400 uppercase text-center">
                                        <th class="p-2 text-left">반</th>
                                        ${EVENTS.map(ev => `<th class="p-2">${ev.name}</th>`).join('')}
                                    </tr></thead>
                                    <tbody class="divide-y">
                    `;
                    for (let c = 1; c <= g.classes; c++) {
                        const classScores = scores[`${g.grade}-${c}`] || {};
                        html += `<tr><td class="p-2 font-bold text-slate-500 text-sm">${c}반</td>`;
                        EVENTS.forEach(ev => {
                            if (ev.type === 'raw') {
                                html += `<td class="p-1">
                                    <input type="number" onchange="updateScore(${g.grade}, ${c}, '${ev.id}', this.value)" 
                                        value="${classScores[ev.id] ?? ''}" placeholder="점수"
                                        class="w-full p-2 rounded-lg bg-amber-50 border border-amber-100 text-xs font-bold text-center outline-none focus:ring-2 focus:ring-amber-500">
                                </td>`;
                            } else {
                                html += `<td class="p-1">
                                    <select onchange="updateScore(${g.grade}, ${c}, '${ev.id}', this.value)"
                                        class="w-full p-2 rounded-lg bg-slate-100 border border-slate-200 text-xs font-bold text-center outline-none focus:ring-2 focus:ring-indigo-500">
                                        <option value="">-</option>
                                        <option value="1" ${classScores[ev.id] == 1 ? 'selected' : ''}>1위</option>
                                        <option value="2" ${classScores[ev.id] == 2 ? 'selected' : ''}>2위</option>
                                        <option value="3" ${classScores[ev.id] == 3 ? 'selected' : ''}>3위</option>
                                        <option value="4" ${classScores[ev.id] == 4 ? 'selected' : ''}>참가</option>
                                    </select>
                                </td>`;
                            }
                        });
                        html += `</tr>`;
                    }
                    html += `</tbody></table></div></div>`;
                    div.innerHTML += html;
                });
            }

            container.appendChild(div);
            // Re-bind update functions to window for onclick/onchange
            window.updateScore = updateScore;
            lucide.createIcons();
        }
    </script>
</body>
</html>
