<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="page-title">2026 수완하나중 Sports Day 채점 현황</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700;900&display=swap');
        body { font-family: 'Noto Sans KR', sans-serif; }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        .fade-in { animation: fadeIn 0.5s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        /* 인쇄 전용 스타일 */
        @media print {
            body { background: white !important; color: black !important; padding: 0 !important; }
            nav, footer, .print-hide { display: none !important; }
            main { margin: 0 !important; padding: 0 !important; max-width: 100% !important; min-height: auto !important; }
            .print-table-container { break-inside: avoid; margin-bottom: 2rem; }
            table { border-collapse: collapse !important; width: 100% !important; }
            th, td { border: 1px solid #cbd5e1 !important; color: black !important; padding: 0.5rem !important; }
            th { background-color: #f1f5f9 !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
            .print-bg { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
            .shadow-sm, .shadow-xl { box-shadow: none !important; }
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 pb-12">

    <!-- Loading Overlay -->
    <div id="loading" class="fixed inset-0 bg-white z-[100] flex flex-col items-center justify-center p-6 text-center">
        <div id="loading-spinner" class="w-12 h-12 border-4 border-blue-600 border-t-transparent rounded-full animate-spin"></div>
        <p id="loading-text" class="mt-4 text-blue-600 font-medium animate-pulse">시스템 로딩 중...</p>
    </div>

    <!-- Admin Auth Modal -->
    <div id="admin-modal" class="fixed inset-0 bg-slate-900/50 z-[100] hidden flex-col items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-white rounded-3xl shadow-2xl p-6 w-full max-w-sm transform transition-all">
            <div class="flex items-center justify-center w-12 h-12 bg-blue-100 rounded-full mb-4 mx-auto">
                <i data-lucide="lock" class="w-6 h-6 text-blue-600"></i>
            </div>
            <h3 class="text-xl font-bold text-center text-slate-800 mb-2">관리자 인증</h3>
            <p class="text-sm text-center text-slate-500 mb-6">해당 메뉴에 접근하려면 암호를 입력하세요.</p>
            <div class="space-y-4">
                <div>
                    <input type="password" id="admin-password" onkeyup="if(event.key === 'Enter') verifyAdmin()" placeholder="암호 입력" class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:border-blue-500 focus:ring-2 focus:ring-blue-200 outline-none transition text-center text-lg tracking-widest">
                    <p id="admin-error" class="text-red-500 text-xs font-bold text-center mt-2 hidden">암호가 일치하지 않습니다.</p>
                </div>
                <div class="flex gap-2">
                    <button onclick="closeAdminModal()" class="flex-1 px-4 py-3 bg-slate-100 text-slate-700 rounded-xl font-bold hover:bg-slate-200 transition">취소</button>
                    <button onclick="verifyAdmin()" class="flex-1 px-4 py-3 bg-blue-600 text-white rounded-xl font-bold hover:bg-blue-700 transition">확인</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Navigation -->
    <nav class="bg-blue-600 text-white shadow-xl sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-4 h-16 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <div class="p-2 bg-white/20 rounded-lg">
                    <i data-lucide="trophy" class="w-6 h-6"></i>
                </div>
                <span id="nav-title" class="font-black text-xl tracking-tighter uppercase whitespace-nowrap">2026 수완하나중 Sports Day 채점 현황</span>
            </div>
            <div class="flex bg-blue-900/50 rounded-full p-1 border border-white/10 overflow-x-auto hide-scrollbar">
                <button onclick="switchView('dashboard')" id="btn-dashboard" class="nav-btn active flex items-center gap-2 px-4 py-2 rounded-full transition-all duration-300 bg-white text-blue-600 shadow-lg font-bold">
                    <i data-lucide="layout-dashboard" class="w-4 h-4"></i>
                    <span class="hidden sm:inline text-sm">채점 결과</span>
                </button>
                <button onclick="switchView('table')" id="btn-table" class="nav-btn flex items-center gap-2 px-4 py-2 rounded-full transition-all duration-300 text-white/70 hover:text-white hover:bg-white/10">
                    <i data-lucide="clipboard-list" class="w-4 h-4"></i>
                    <span class="hidden sm:inline text-sm">현황판</span>
                </button>
                <button onclick="attemptAdminAccess('admin')" id="btn-admin" class="nav-btn flex items-center gap-2 px-4 py-2 rounded-full transition-all duration-300 text-white/70 hover:text-white hover:bg-white/10">
                    <i data-lucide="settings" class="w-4 h-4"></i>
                    <span class="hidden sm:inline text-sm">점수 입력</span>
                </button>
                <button onclick="switchView('print')" id="btn-print" class="nav-btn flex items-center gap-2 px-4 py-2 rounded-full transition-all duration-300 text-white/70 hover:text-white hover:bg-white/10">
                    <i data-lucide="printer" class="w-4 h-4"></i>
                    <span class="hidden sm:inline text-sm">출력</span>
                </button>
                <button onclick="attemptAdminAccess('settings')" id="btn-settings" class="nav-btn flex items-center gap-2 px-4 py-2 rounded-full transition-all duration-300 text-white/70 hover:text-white hover:bg-white/10">
                    <i data-lucide="sliders" class="w-4 h-4"></i>
                    <span class="hidden sm:inline text-sm">설정</span>
                </button>
            </div>
        </div>
    </nav>

    <main id="content" class="max-w-6xl mx-auto px-4 py-6 min-h-screen">
        <!-- JS 동적 삽입 -->
    </main>

    <footer class="mt-12 py-8 text-center border-t border-slate-200">
        <p id="footer-text" class="text-[10px] text-slate-300">© 2026 수완하나중</p>
    </footer>

    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-auth.js";
        import { getFirestore, collection, doc, onSnapshot, setDoc, query } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js";

        // --- Firebase Config ---
        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {
            apiKey: "AIzaSyA7_ZxWy6ctrDAVM_vypp9z0vxFRLtD4P0",
            authDomain: "book-fad28.firebaseapp.com",
            projectId: "book-fad28",
            storageBucket: "book-fad28.firebasestorage.app",
            messagingSenderId: "973551631804",
            appId: "1:973551631804:web:61b8848e0b6e146a19bfb9"
        };
        
        let db, auth;
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'sports-day-final';

        // --- Global States ---
        window.scores = {};
        window.currentView = 'dashboard';
        window.currentUser = null;
        window.isAdminAuthed = false;
        window.pendingAdminView = 'admin';

        // --- Constants & Config ---
        const ADMIN_PWD = "suwan123";

        // 초기 기본 설정값 (DB에서 불러오기 전)
        const DEFAULT_EVENTS = [
            { id: 'tug', name: '줄다리기', type: 'rank', points: { 1: 600, 2: 500, 3: 400, base: 300 } },
            { id: 'sixLeg', name: '5인 6각', type: 'rank', points: { 1: 600, 2: 500, 3: 400, base: 300 } },
            { id: 'jump8', name: '8자 마라톤 줄넘기', type: 'rank', points: { 1: 500, 2: 400, 3: 300, base: 200 } },
            { id: 'longRope', name: '긴줄 함께뛰기', type: 'rank', points: { 1: 400, 2: 300, 3: 200, base: 100 } },
            { id: 'relay', name: '이어달리기', type: 'rank', points: { 1: 400, 2: 300, 3: 200, base: 100 } },
            { id: 'cheer', name: '기타(응원상)', type: 'raw' },
            { id: 'penalty', name: '감점', type: 'penalty' }
        ];

        window.appConfig = {
            year: "2026",
            schoolName: "수완하나중",
            GRADES: [
                { grade: 1, classes: 10 },
                { grade: 2, classes: 10 },
                { grade: 3, classes: 11 }
            ],
            eventMode: 'common', // 'common' (통합) or 'separate' (개별)
            EVENTS: JSON.parse(JSON.stringify(DEFAULT_EVENTS)),
            EVENTS_1: JSON.parse(JSON.stringify(DEFAULT_EVENTS)),
            EVENTS_2: JSON.parse(JSON.stringify(DEFAULT_EVENTS)),
            EVENTS_3: JSON.parse(JSON.stringify(DEFAULT_EVENTS))
        };

        // 학년별 종목 추출 헬퍼 함수
        window.getEventsForGrade = (grade) => {
            if (window.appConfig && window.appConfig.eventMode === 'separate') {
                return window.appConfig[`EVENTS_${grade}`] || [];
            }
            return window.appConfig?.EVENTS || [];
        };

        // --- Initialize ---
        window.onload = async () => {
            lucide.createIcons();

            if (!firebaseConfig.apiKey && typeof __firebase_config === 'undefined') {
                console.warn("Firebase 설정이 없습니다. 오프라인 모드로 실행합니다.");
                document.getElementById('loading').classList.add('hidden');
                render();
                return;
            }

            try {
                const app = initializeApp(firebaseConfig);
                auth = getAuth(app);
                db = getFirestore(app);

                // 권한 오류 해결을 위한 인증 흐름 개선
                onAuthStateChanged(auth, (user) => {
                    if (user) {
                        window.currentUser = user;
                        listenToConfig();
                        listenToScores();
                    } else {
                        document.getElementById('loading').classList.add('hidden');
                        render();
                    }
                });

                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (err) {
                console.error("Firebase 초기화 실패:", err);
                document.getElementById('loading').classList.add('hidden');
                render();
            }
        };

        window.updateTitles = () => {
            const year = window.appConfig.year || "2026";
            const schoolName = window.appConfig.schoolName || "수완하나중";
            const fullTitle = `${year} ${schoolName} Sports Day 채점 현황`;
            
            const pageTitle = document.getElementById('page-title');
            if (pageTitle) pageTitle.innerText = fullTitle;
            
            const navTitle = document.getElementById('nav-title');
            if (navTitle) navTitle.innerText = fullTitle;
            
            const footerText = document.getElementById('footer-text');
            if (footerText) footerText.innerText = `© ${year} ${schoolName}`;
        };

        function listenToConfig() {
            if (!window.currentUser) return;
            const q = doc(db, 'artifacts', appId, 'public', 'data', 'config', 'main');
            onSnapshot(q, (docSnap) => {
                if (docSnap.exists()) {
                    const data = docSnap.data();
                    window.appConfig = {
                        year: data.year || window.appConfig.year || "2026",
                        schoolName: data.schoolName || window.appConfig.schoolName || "수완하나중",
                        GRADES: (data.GRADES && data.GRADES.length > 0) ? data.GRADES : window.appConfig.GRADES,
                        eventMode: data.eventMode || 'common',
                        EVENTS: data.EVENTS || window.appConfig.EVENTS,
                        EVENTS_1: data.EVENTS_1 || data.EVENTS || window.appConfig.EVENTS,
                        EVENTS_2: data.EVENTS_2 || data.EVENTS || window.appConfig.EVENTS,
                        EVENTS_3: data.EVENTS_3 || data.EVENTS || window.appConfig.EVENTS
                    };
                } else {
                    setDoc(q, window.appConfig); // DB에 초기값 생성
                }
                window.updateTitles();
                render();
            }, (err) => {
                console.error("Config Listen Error:", err);
            });
        }

        function listenToScores() {
            if (!window.currentUser) return;
            const q = query(collection(db, 'artifacts', appId, 'public', 'data', 'scores'));
            onSnapshot(q, (snapshot) => {
                window.scores = {};
                snapshot.forEach(doc => {
                    window.scores[doc.id] = doc.data();
                });
                render();
                document.getElementById('loading').classList.add('hidden');
            }, (err) => {
                console.error("Firestore Listen Error:", err);
                render();
                document.getElementById('loading').classList.add('hidden');
            });
        }

        // --- Logic & Rendering ---
        function calculateStats() {
            const results = [];
            const grades = window.appConfig?.GRADES || [];

            grades.forEach(g => {
                const events = window.getEventsForGrade(g.grade);

                for (let c = 1; c <= g.classes; c++) {
                    const id = `${g.grade}-${c}`;
                    const classData = window.scores[id] || {};
                    let total = 0;
                    const breakdown = {};

                    events.forEach(ev => {
                        const val = classData[ev.id];
                        let p = 0;
                        if (ev.type === 'raw') {
                            p = parseInt(val) || 0;
                        } else if (ev.type === 'penalty') {
                            // penalty인 경우 무조건 절대값의 음수로 계산
                            p = -(Math.abs(parseInt(val) || 0));
                        } else {
                            const pts = ev.points || {}; // points 객체가 없을 경우 에러 방지
                            if (val == 1) p = pts[1] || 0;
                            else if (val == 2) p = pts[2] || 0;
                            else if (val == 3) p = pts[3] || 0;
                            else if (val >= 4) p = pts.base || 0;
                        }
                        total += p;
                        breakdown[ev.id] = p; // penalty라면 자동으로 음수가 저장됨
                    });
                    results.push({ id, grade: g.grade, classNum: c, total, breakdown });
                }
            });
            return results;
        }

        function getRank(grade, total, allStats) {
            const gradeTotals = allStats.filter(s => s.grade === grade).map(s => s.total);
            const sorted = [...new Set(gradeTotals)].sort((a, b) => b - a);
            return sorted.indexOf(total) + 1;
        }

        window.switchView = (view) => {
            window.currentView = view;
            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.className = "nav-btn flex items-center gap-2 px-4 py-2 rounded-full transition-all duration-300 text-white/70 hover:text-white hover:bg-white/10";
            });
            document.getElementById(`btn-${view}`).className = "nav-btn active flex items-center gap-2 px-4 py-2 rounded-full transition-all duration-300 bg-white text-blue-600 shadow-lg font-bold";
            render();
        };

        window.attemptAdminAccess = (targetView) => {
            if (window.isAdminAuthed) {
                window.switchView(targetView);
            } else {
                window.pendingAdminView = targetView;
                document.getElementById('admin-password').value = '';
                document.getElementById('admin-error').classList.add('hidden');
                document.getElementById('admin-modal').classList.remove('hidden');
                document.getElementById('admin-modal').classList.add('flex');
                setTimeout(() => document.getElementById('admin-password').focus(), 100);
            }
        };

        window.closeAdminModal = () => {
            document.getElementById('admin-modal').classList.add('hidden');
            document.getElementById('admin-modal').classList.remove('flex');
        };

        window.verifyAdmin = () => {
            const pwd = document.getElementById('admin-password').value;
            if (pwd === ADMIN_PWD) {
                window.isAdminAuthed = true;
                window.closeAdminModal();
                window.switchView(window.pendingAdminView);
            } else {
                document.getElementById('admin-error').classList.remove('hidden');
                document.getElementById('admin-password').value = '';
                document.getElementById('admin-password').focus();
            }
        };

        window.showResetConfirm = () => {
            document.getElementById('reset-confirm').classList.remove('hidden');
        };

        window.hideResetConfirm = () => {
            document.getElementById('reset-confirm').classList.add('hidden');
        };

        window.executeReset = async () => {
            if (!window.isAdminAuthed) return;
            
            const loadingEl = document.getElementById('loading');
            const loadingText = document.getElementById('loading-text');
            if(loadingEl && loadingText) {
                loadingText.innerText = "데이터 초기화 중...";
                loadingEl.classList.remove('hidden');
            }
            
            try {
                const promises = [];
                window.appConfig.GRADES.forEach(g => {
                    for (let c = 1; c <= g.classes; c++) {
                        const docId = `${g.grade}-${c}`;
                        window.scores[docId] = { grade: g.grade, classNum: c };
                        
                        if (db && window.currentUser) {
                            const p = setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'scores', docId), {
                                grade: g.grade, 
                                classNum: c, 
                                lastUpdated: Date.now()
                            });
                            promises.push(p);
                        }
                    }
                });
                
                if (promises.length > 0) {
                    await Promise.all(promises);
                }

                const toast = document.getElementById('save-toast');
                if(toast) {
                    toast.innerText = "모든 점수가 성공적으로 초기화되었습니다.";
                    toast.classList.remove('opacity-0', 'pointer-events-none', 'bg-slate-800');
                    toast.classList.add('opacity-100', 'bg-red-600');
                    setTimeout(() => {
                        toast.classList.add('opacity-0', 'pointer-events-none', 'bg-slate-800');
                        toast.classList.remove('opacity-100', 'bg-red-600');
                        toast.innerText = "설정이 성공적으로 저장되었습니다!";
                    }, 3000);
                }
                
                window.hideResetConfirm();
                window.switchView('dashboard');
                
            } catch(e) {
                console.error("초기화 실패:", e);
                alert("초기화 중 오류가 발생했습니다. 권한이나 네트워크를 확인해 주세요.");
            } finally {
                if(loadingEl && loadingText) {
                    loadingEl.classList.add('hidden');
                    loadingText.innerText = "시스템 로딩 중...";
                }
            }
        };

        window.logoutAdmin = () => {
            window.isAdminAuthed = false;
            window.switchView('dashboard');
        };

        window.updateScore = async (grade, classNum, eventId, value) => {
            if (!window.isAdminAuthed) {
                console.warn("권한이 없어 점수를 업데이트할 수 없습니다.");
                return;
            }

            const docId = `${grade}-${classNum}`;
            const currentData = window.scores[docId] || { grade, classNum };
            const finalValue = value === "" ? null : (isNaN(value) ? value : parseInt(value));

            window.scores[docId] = { ...currentData, [eventId]: finalValue };
            render();

            if (db && window.currentUser) {
                try {
                    await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'scores', docId), {
                        ...window.scores[docId],
                        lastUpdated: Date.now()
                    });
                } catch (e) {
                    console.error("저장 실패:", e);
                }
            }
        };

        // --- 설정 뷰 헬퍼 함수들 ---
        window.togglePoints = (selectEl) => {
            const tr = selectEl.closest('tr');
            const inputs = tr.querySelectorAll('.points-input');
            if (selectEl.value === 'raw' || selectEl.value === 'penalty') {
                inputs.forEach(input => { input.disabled = true; input.classList.add('bg-slate-100', 'text-transparent'); });
            } else {
                inputs.forEach(input => { input.disabled = false; input.classList.remove('bg-slate-100', 'text-transparent'); });
            }
        };

        window.addEventRow = (gradeNum) => {
            const tbody = document.getElementById(`config-events-tbody-${gradeNum}`);
            if(!tbody) return;

            const tr = document.createElement('tr');
            tr.className = "cfg-event-row border-b border-slate-100 hover:bg-slate-50 transition-colors";
            const newId = 'ev_' + Date.now();
            tr.dataset.id = newId;
            tr.innerHTML = `
                <td class="p-2"><input type="text" class="cfg-ev-name w-full p-2 border border-slate-200 rounded text-sm outline-none focus:border-blue-500" placeholder="종목명"></td>
                <td class="p-2">
                    <select class="cfg-ev-type w-full p-2 border border-slate-200 rounded text-sm outline-none focus:border-blue-500" onchange="window.togglePoints(this)">
                        <option value="rank">순위제</option>
                        <option value="raw">점수입력(가점)</option>
                        <option value="penalty">감점입력(마이너스)</option>
                    </select>
                </td>
                <td class="p-2"><input type="number" class="cfg-ev-p1 w-full p-2 border border-slate-200 rounded text-sm points-input outline-none focus:border-blue-500" placeholder="1위"></td>
                <td class="p-2"><input type="number" class="cfg-ev-p2 w-full p-2 border border-slate-200 rounded text-sm points-input outline-none focus:border-blue-500" placeholder="2위"></td>
                <td class="p-2"><input type="number" class="cfg-ev-p3 w-full p-2 border border-slate-200 rounded text-sm points-input outline-none focus:border-blue-500" placeholder="3위"></td>
                <td class="p-2"><input type="number" class="cfg-ev-pb w-full p-2 border border-slate-200 rounded text-sm points-input outline-none focus:border-blue-500" placeholder="기본"></td>
                <td class="p-2 text-center">
                    <button onclick="this.closest('tr').remove()" class="p-2 text-red-500 hover:bg-red-50 rounded-lg transition"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                </td>
            `;
            tbody.appendChild(tr);
            lucide.createIcons();
        };

        window.toggleEventMode = (mode) => {
            if (mode === 'common') {
                document.getElementById('cfg-events-common').classList.remove('hidden');
                document.getElementById('cfg-events-separate').classList.add('hidden');
            } else {
                document.getElementById('cfg-events-common').classList.add('hidden');
                document.getElementById('cfg-events-separate').classList.remove('hidden');
                window.switchEventTab(1); // 다를 경우 선택 시 기본 1학년 탭 켜기
            }
        };

        window.switchEventTab = (gradeNum) => {
            [1, 2, 3].forEach(n => {
                const btn = document.getElementById(`evt-tab-btn-${n}`);
                const panel = document.getElementById(`cfg-events-g${n}`);
                if (!btn || !panel) return;

                if (n === gradeNum) {
                    btn.classList.add('border-blue-600', 'text-blue-600');
                    btn.classList.remove('border-transparent', 'text-slate-500', 'hover:text-slate-700');
                    panel.classList.remove('hidden');
                } else {
                    btn.classList.remove('border-blue-600', 'text-blue-600');

        const extractEventsFromTable = (tbodyId) => {
            const rows = document.querySelectorAll(`#${tbodyId} .cfg-event-row`);
            const extracted = [];
            rows.forEach((row, index) => {
                const id = row.dataset.id || ('ev_' + Date.now() + '_' + index);
                const name = row.querySelector('.cfg-ev-name').value;
                const type = row.querySelector('.cfg-ev-type').value;
                
                if(!name.trim()) return; // 비어있는 이름 무시
                
                if(type === 'rank') {
                    extracted.push({
                        id, name, type,
                        points: {
                            1: parseInt(row.querySelector('.cfg-ev-p1').value) || 0,
                            2: parseInt(row.querySelector('.cfg-ev-p2').value) || 0,
                            3: parseInt(row.querySelector('.cfg-ev-p3').value) || 0,
                            base: parseInt(row.querySelector('.cfg-ev-pb').value) || 0
                        }
                    });
                } else {
                    extracted.push({ id, name, type });
                }
            });
            return extracted;
        };

        window.saveConfig = async () => {
            if(!window.isAdminAuthed) return;
            
            const btn = document.getElementById('save-config-btn');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<div class="w-5 h-5 border-2 border-white border-t-transparent rounded-full animate-spin mx-auto"></div>';
            
            const eventModeRadio = document.querySelector('input[name="eventMode"]:checked');
            const newMode = eventModeRadio ? eventModeRadio.value : (window.appConfig.eventMode || 'common');

            const newConfig = {
                year: document.getElementById('cfg-year').value || new Date().getFullYear().toString(),
                schoolName: document.getElementById('cfg-school').value || '학교',
                GRADES: [
                    { grade: 1, classes: parseInt(document.getElementById('cfg-g1').value) || 0 },
                    { grade: 2, classes: parseInt(document.getElementById('cfg-g2').value) || 0 },
                    { grade: 3, classes: parseInt(document.getElementById('cfg-g3').value) || 0 }

                eventMode: newMode,
                EVENTS: extractEventsFromTable('config-events-tbody-0'),

                EVENTS_2: extractEventsFromTable('config-events-tbody-2'),
                EVENTS_3: extractEventsFromTable('config-events-tbody-3')
            };
            
            window.appConfig = newConfig;
            window.updateTitles();
            
            if(db && window.currentUser) {
                try {
                    await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'config', 'main'), newConfig);
                    const toast = document.getElementById('save-toast');
                    toast.classList.remove('opacity-0', 'pointer-events-none');
                    toast.classList.add('opacity-100');

                        toast.classList.add('opacity-0', 'pointer-events-none');

                    console.error("설정 저장 실패:", e);

            btn.innerHTML = originalText;

                                설정이 성공적으로 저장되었습니다!
                            </div>

                            <!-- 기본 정보 설정 -->
                            <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                                <div class="p-4 bg-slate-50 border-b border-slate-100 font-bold text-slate-800 flex items-center gap-2">
                                    <i data-lucide="info" class="w-4 h-4 text-blue-500"></i> 기본 정보 설정
                                </div>
                                <div class="p-5 grid grid-cols-1 sm:grid-cols-2 gap-6">
                                    <div>
                                <label class="block text-xs font-bold text-slate-500 mb-2">행사 연도</label>
                                <input type="text" id="cfg-year" value="${window.appConfig?.year || ''}" placeholder="예: 2026" class="w-full p-3 border border-slate-200 rounded-xl outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-100 font-bold text-slate-700">
                            </div>
                            <div>
                                <label class="block text-xs font-bold text-slate-500 mb-2">학교 이름</label>
                                <input type="text" id="cfg-school" value="${window.appConfig?.schoolName || ''}" placeholder="예: 수완하나중" class="w-full p-3 border border-slate-200 rounded-xl outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-100 font-bold text-slate-700">
                            </div>
                                </div>
                            </div>

                            <!-- 학급 수 설정 -->
                            <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                                <div class="p-4 bg-slate-50 border-b border-slate-100 font-bold text-slate-800 flex items-center gap-2">
                                    <i data-lucide="users" class="w-4 h-4 text-blue-500"></i> 학급 수 설정
                                </div>
                                <div class="p-5 grid grid-cols-1 sm:grid-cols-3 gap-6">
                                    <div>
                                        <label class="block text-xs font-bold text-slate-500 mb-2">1학년 반 수</label>
                                        <input type="number" id="cfg-g1" value="${currentConfigGrades.find(g=>g.grade===1)?.classes || 0}" class="w-full p-3 border border-slate-200 rounded-xl outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-100 font-bold text-slate-700">
                                    </div>
                                    <div>
                                        <label class="block text-xs font-bold text-slate-500 mb-2">2학년 반 수</label>
                                        <input type="number" id="cfg-g2" value="${currentConfigGrades.find(g=>g.grade===2)?.classes || 0}" class="w-full p-3 border border-slate-200 rounded-xl outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-100 font-bold text-slate-700">
                                    </div>
                                    <div>
                                        <label class="block text-xs font-bold text-slate-500 mb-2">3학년 반 수</label>
                                        <input type="number" id="cfg-g3" value="${currentConfigGrades.find(g=>g.grade===3)?.classes || 0}" class="w-full p-3 border border-slate-200 rounded-xl outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-100 font-bold text-slate-700">
                                    </div>
                                </div>
                            </div>

                            <!-- 종목 및 배점 설정 -->
                            <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                                <div class="p-4 bg-slate-50 border-b border-slate-100 flex items-center justify-between">
                                    <div class="font-bold text-slate-800 flex items-center gap-2">
                                        <i data-lucide="medal" class="w-4 h-4 text-blue-500"></i> 종목 및 배점 설정
                                    </div>
                                </div>

                                <!-- 모드 전환 스위치 -->
                                <div class="flex flex-col sm:flex-row gap-6 p-4 border-b border-slate-100 bg-white">
                                    <label class="flex items-center gap-3 cursor-pointer group">
                                        <input type="radio" name="eventMode" value="common" onchange="window.toggleEventMode('common')" ${mode === 'common' ? 'checked' : ''} class="w-4 h-4 text-blue-600 border-slate-300 focus:ring-blue-500">
                                        <span class="text-sm font-bold text-slate-700 group-hover:text-blue-600 transition">학년 통합 종목 (모든 학년 동일)</span>
                                    </label>
                                    <label class="flex items-center gap-3 cursor-pointer group">
                                        <input type="radio" name="eventMode" value="separate" onchange="window.toggleEventMode('separate')" ${mode === 'separate' ? 'checked' : ''} class="w-4 h-4 text-blue-600 border-slate-300 focus:ring-blue-500">
                                        <span class="text-sm font-bold text-slate-700 group-hover:text-blue-600 transition">학년별 개별 종목 (다를 경우)</span>
                                    </label>
                                </div>

                                <!-- 통합 모드 (모든 학년 동일) 컨테이너 -->
                                <div id="cfg-events-common" class="${mode === 'separate' ? 'hidden' : ''}">
                                    <div class="p-3 bg-blue-50/50 flex justify-end">
                                        <button onclick="window.addEventRow(0)" class="px-3 py-1.5 bg-blue-100 text-blue-700 hover:bg-blue-200 rounded-lg text-xs font-bold transition flex items-center gap-1">
                                            <i data-lucide="plus" class="w-3.5 h-3.5"></i> 통합 종목 추가
                                        </button>
                                    </div>
                                    ${buildEventTableHtml(0, window.appConfig.EVENTS || [])}
                                </div>

                                <!-- 개별 모드 (학년별 다를 경우) 컨테이너 -->
                                <div id="cfg-events-separate" class="${mode === 'separate' ? '' : 'hidden'} bg-slate-50">
                                    <div class="flex border-b border-slate-200">
                                        <button id="evt-tab-btn-1" onclick="window.switchEventTab(1)" class="flex-1 py-3 text-sm font-bold border-b-2 border-blue-600 text-blue-600 transition">1학년 종목</button>
                                        <button id="evt-tab-btn-2" onclick="window.switchEventTab(2)" class="flex-1 py-3 text-sm font-bold border-b-2 border-transparent text-slate-500 hover:text-slate-700 transition">2학년 종목</button>
                                        <button id="evt-tab-btn-3" onclick="window.switchEventTab(3)" class="flex-1 py-3 text-sm font-bold border-b-2 border-transparent text-slate-500 hover:text-slate-700 transition">3학년 종목</button>
                                    </div>
                                    
                                    <div id="cfg-events-g1" class="bg-white">
                                        <div class="p-3 flex justify-end bg-blue-50/30 border-b border-blue-50">
                                            <button onclick="window.addEventRow(1)" class="px-3 py-1.5 bg-blue-100 text-blue-700 hover:bg-blue-200 rounded-lg text-xs font-bold transition flex items-center gap-1">
                                                <i data-lucide="plus" class="w-3.5 h-3.5"></i> 1학년 종목 추가
                                            </button>
                                        </div>
                                        ${buildEventTableHtml(1, window.appConfig.EVENTS_1 || [])}
                                    </div>
                                    
                                    <div id="cfg-events-g2" class="hidden bg-white">
                                        <div class="p-3 flex justify-end bg-blue-50/30 border-b border-blue-50">
                                            <button onclick="window.addEventRow(2)" class="px-3 py-1.5 bg-blue-100 text-blue-700 hover:bg-blue-200 rounded-lg text-xs font-bold transition flex items-center gap-1">
                                                <i data-lucide="plus" class="w-3.5 h-3.5"></i> 2학년 종목 추가
                                            </button>
                                        </div>
                                        ${buildEventTableHtml(2, window.appConfig.EVENTS_2 || [])}
                                    </div>
                                    
                                    <div id="cfg-events-g3" class="hidden bg-white">
                                        <div class="p-3 flex justify-end bg-blue-50/30 border-b border-blue-50">
                                            <button onclick="window.addEventRow(3)" class="px-3 py-1.5 bg-blue-100 text-blue-700 hover:bg-blue-200 rounded-lg text-xs font-bold transition flex items-center gap-1">
                                                <i data-lucide="plus" class="w-3.5 h-3.5"></i> 3학년 종목 추가
                                            </button>
                                        </div>
                                        ${buildEventTableHtml(3, window.appConfig.EVENTS_3 || [])}
                                    </div>
                                </div>

                                <div class="p-4 bg-amber-50 border-t border-amber-100 text-xs text-amber-700 font-medium">
                                    <span class="font-bold">💡 채점 방식 안내:</span> '순위제'는 등수별 점수를 일괄 부여하며, '점수입력(가점)' 및 '감점입력(마이너스)'은 현장에서 직접 득점/감점 점수를 타이핑할 때 사용합니다. 감점은 입력 시 자동으로 총점에서 차감됩니다.
                                </div>
                            </div>

                            <!-- 데이터 초기화 설정 -->
                            <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                                <div class="p-5 border-b border-slate-100 flex flex-col sm:flex-row sm:items-center justify-between gap-4">
                                    <div>
                                        <h3 class="text-lg font-bold text-slate-800">모든 데이터 초기화</h3>
                                        <p class="text-sm text-slate-500">모든 학급의 점수 및 순위 데이터를 0으로 초기화합니다.</p>
                                    </div>
                                    <button onclick="window.showResetConfirm()" class="shrink-0 px-4 py-2 bg-red-50 text-red-600 hover:bg-red-100 border border-red-200 rounded-xl font-bold transition">
                                        초기화 진행
                                    </button>
                                </div>
                                <div id="reset-confirm" class="hidden p-5 bg-red-50 border-t border-red-100 transition-all">
                                    <div class="flex items-start gap-3">
                                        <i data-lucide="alert-triangle" class="w-5 h-5 text-red-600 shrink-0 mt-0.5"></i>
                                        <div>
                                            <p class="text-red-700 font-bold mb-3">정말로 모든 점수 데이터를 초기화하시겠습니까? 이 작업은 복구할 수 없습니다.</p>
                                            <div class="flex gap-2">
                                                <button onclick="window.executeReset()" class="px-5 py-2 bg-red-600 text-white rounded-lg font-bold hover:bg-red-700 transition shadow-sm">네, 초기화합니다</button>
                                                <button onclick="window.hideResetConfirm()" class="px-5 py-2 bg-white border border-slate-300 text-slate-700 rounded-lg font-bold hover:bg-slate-50 transition">취소</button>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <!-- 로그아웃 설정 -->
                            <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                                <div class="p-5 flex flex-col sm:flex-row sm:items-center justify-between gap-4">
                                    <div>
                                        <h3 class="text-lg font-bold text-slate-800">관리자 로그아웃</h3>
                                        <p class="text-sm text-slate-500">점수 입력 및 설정 모드를 종료하고 채점 결과 화면으로 돌아갑니다.</p>
                                    </div>
                                    <button onclick="window.logoutAdmin()" class="shrink-0 px-4 py-2 bg-slate-100 text-slate-600 hover:bg-slate-200 rounded-xl font-bold transition">
                                        로그아웃
                                    </button>
                                </div>
                            </div>
                        </div>
                    `;
                }
                container.appendChild(div);
                lucide.createIcons();
                
            } catch (err) {
                console.error("화면 렌더링 중 오류 발생:", err);
                const container = document.getElementById('content');
                if(container) {
                    container.innerHTML = `
                        <div class="p-8 text-center bg-red-50 rounded-2xl border border-red-100 shadow-sm mt-10">
                            <i data-lucide="alert-triangle" class="w-12 h-12 text-red-500 mx-auto mb-4"></i>
                            <h2 class="text-xl font-bold text-red-600 mb-2">화면을 불러오는 중 문제가 발생했습니다.</h2>
                            <p class="text-red-500 text-sm mb-4">데이터베이스의 설정값(종목, 학급 수 등)이 손상되었거나 불완전합니다.</p>
                            <button onclick="window.switchView('settings')" class="px-6 py-2 bg-red-600 text-white rounded-lg font-bold hover:bg-red-700 transition">설정 메뉴로 이동</button>
                            <p class="text-xs text-red-400 mt-4 break-words font-mono">${err.message}</p>
                        </div>
                    `;
                    lucide.createIcons();
                }
                document.getElementById('loading').classList.add('hidden');
            }
        }
    </script>
</body>
</html>
